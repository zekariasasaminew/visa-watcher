name: Visa Appointment Watcher

on:
  schedule:
    - cron: "2-59/5 * * * *"   # every 5 minutes, offset to avoid :00 congestion
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4       # kill if it hangs (must finish before next run)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Chromium system deps (always)
        run: npx playwright install-deps chromium

      - name: Run visa watcher (single check)
        env:
          VISA_EMAIL: ${{ secrets.VISA_EMAIL }}
          VISA_PASSWORD: ${{ secrets.VISA_PASSWORD }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          SINGLE_RUN: "true"
        run: node visa-watcher.js
